<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BGM Tester</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
    button { padding: 15px 30px; font-size: 20px; background: #00ff66; color: #000; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 10px; }
    button.stop { background: #ff3e3e; color: #fff; }
    .slider-group { margin: 30px; }
    input[type="range"] { width: 300px; }
  </style>
</head>
<body>
  <h1>サイバーパンク BGM テスター</h1>
  <p>ボタンを押すと、現在プログラムで合成しているBGMがループ再生されます。</p>
  
  <button id="playBtn">▶ BGMを再生</button>
  <button id="stopBtn" class="stop">■ 停止</button>

  <div class="slider-group">
    <label>BGM音量:</label>
    <br>
    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.5">
  </div>

  <script src="js/synth.js"></script>
  <script>
    const footstepSystem = new FootstepAudio();
    
    document.getElementById('playBtn').addEventListener('click', () => {
      footstepSystem.start();
      footstepSystem.setVolume('bgm', parseFloat(document.getElementById('volSlider').value));
      // 適当な時間を渡してBGM再生開始
      footstepSystem.playBGM(0);
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      footstepSystem.stopBGM();
    });

    document.getElementById('volSlider').addEventListener('input', (e) => {
      footstepSystem.setVolume('bgm', parseFloat(e.target.value));
    });
  </script>
</body>
</html>
